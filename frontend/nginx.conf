server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Crucial for React Router: redirects all 404s to index.html
        try_files $uri $uri/ /index.html;
    }

    # Optional: If you want to proxy API calls internally 
    # instead of using api.gregsfantasyhelper.solutions
    location /api {
        proxy_pass http://fantasy_helper_app_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}