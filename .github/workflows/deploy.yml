name: Build and Push to GHCR
on: [push]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and Push
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/fantasy_helper_app_ui:latest ./frontend
          docker push ghcr.io/${{ github.repository_owner }}/fantasy_helper_app_ui:latest
